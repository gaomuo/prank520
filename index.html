<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>请选择你的520攻略对象</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at top,#ff4d6d 0%,transparent 30%),
        linear-gradient(135deg,#111827,#1e1b4b,#312e81);
      padding:20px;
      color:white;
    }

    .card{
      width:100%;
      max-width:420px;

      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.15);

      border-radius:30px;

      padding:28px 22px;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.4);

      animation:fadeIn 0.6s ease;
    }

    .title{
      text-align:center;
      font-size:30px;
      font-weight:800;
      line-height:1.3;
    }

    .sub{
      margin-top:14px;
      text-align:center;
      color:rgba(255,255,255,0.78);
      line-height:1.7;
      font-size:15px;
    }

    .input-box{
      margin-top:26px;
    }

    input{
      width:100%;
      height:58px;

      border:none;
      outline:none;

      border-radius:18px;

      padding:0 20px;

      font-size:20px;

      text-align:center;

      color:white;

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.15);
    }

    input::placeholder{
      color:rgba(255,255,255,0.45);
    }

    button{
      margin-top:18px;

      width:100%;
      height:58px;

      border:none;
      border-radius:18px;

      font-size:19px;
      font-weight:700;

      color:white;

      cursor:pointer;

      background:
        linear-gradient(
          135deg,
          #ff4d6d,
          #7c3aed
        );

      box-shadow:
        0 10px 30px rgba(255,77,109,0.35);

      transition:0.2s;
    }

    button:active{
      transform:scale(0.97);
    }

    .tip{
      margin-top:12px;
      text-align:center;
      font-size:13px;
      color:rgba(255,255,255,0.65);
    }

    .result{
      display:none;
      margin-top:26px;
      animation:show 0.4s ease;
    }

    .result img{
      width:100%;
      aspect-ratio:1/1;

      object-fit:cover;

      border-radius:24px;

      border:1px solid rgba(255,255,255,0.12);

      box-shadow:
        0 20px 40px rgba(0,0,0,0.35);
    }

    .text{
      margin-top:16px;
      text-align:center;
      font-size:18px;
      font-weight:600;
      color:rgba(255,255,255,0.9);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes show{
      from{
        opacity:0;
        transform:scale(0.9);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @media(max-width:420px){

      .title{
        font-size:26px;
      }

      .card{
        padding:24px 18px;
      }

    }
  </style>
</head>

<body>

  <div class="card">

    <div class="title">
      请选择你的520攻略对象
    </div>

    <div class="sub">
      输入 0 ~ 5 的任意数字<br>
      测试你的缘分对象
    </div>

    <div class="input-box">

      <input
        id="num"
        type="number"
        min="0"
        max="5"
        placeholder="请输入数字 0~5"
      >

      <button onclick="showResult()">
        立即匹配
      </button>

      <div class="tip">
        支持手机打开与分享链接
      </div>

    </div>

    <div class="result" id="result">

      <img id="photo" src="" alt="结果图片">

      <div class="text" id="resultText"></div>

    </div>

  </div>

  <script>

    const images = {
      0: "0.jpeg",
      1: "1.jpeg",
      2: "2.jpeg",
      3: "3.jpeg",
      4: "4.jpeg",
      5: "5.jpeg"
    };

    const names = {
      0: "你点的0 ❤️",
      1: "隐藏款！！ 😳",
      2: "隔壁班天菜 💘",
      3: "网恋对象本人 👀",
      4: "你的命中注定 ✨",
      5: "真正的小丑竟是你 🤡"
    };

    function showResult(){

      const val =
        document
          .getElementById("num")
          .value
          .trim();

      if(!/^[0-5]$/.test(val)){
        alert("请输入 0~5 的数字");
        return;
      }

      const photo =
        document.getElementById("photo");

      const result =
        document.getElementById("result");

      const text =
        document.getElementById("resultText");

      photo.src = images[val];

      text.innerHTML =
        "匹配结果：<br><br>" + names[val];

      result.style.display = "block";

      result.scrollIntoView({
        behavior:"smooth"
      });

    }

  </script>

</body>
</html>
